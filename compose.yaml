services:
  todolist-api:
    build: .
    image: todolist-api
    ports:
      - 5014:8080
    profiles:
      - app
    env_file:
      - .env.${ASPNETCORE_ENVIRONMENT}
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine3.23
    ports:
      - 5432:5432
    env_file:
      - .env.${ASPNETCORE_ENVIRONMENT}